name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  fastapi-hello-world:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: journal/fastapi-hello-world

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --frozen

      - name: Lint
        run: uv run ruff check .

      - name: Test
        run: uv run pytest

      - name: Build Docker image
        run: docker build -t intern-api:ci .
